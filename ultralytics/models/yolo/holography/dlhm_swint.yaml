# ultralytics/cfg/models/holography/dlhm_swint.yaml
# Pass this path to HolographyTrainer via overrides['model']

task: holography

# Backbone
embed_dim: 96
depths: [2, 2, 6, 2]
num_heads: [3, 6, 12, 24]
window_size: 8
physics_dim: 4

# Loss weights
loss_alpha: 1.0
loss_beta:  1.0
loss_gamma: 0.5
loss_delta: 0.5

# nc is required by BaseTrainer even for non-detection tasks
nc: 1
