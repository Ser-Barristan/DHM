# ════════════════════════════════════════════════════════════════════════════
# MaxMAP-RBC  — 3-class RBC detection (hypoxia / normoxia / healthy)
# ultralytics/cfg/models/v8/maxmap_rbc.yaml
#
# Modules used: ALL already registered in your tasks.py
#   Conv, C2f, C3TR, SwinTransformer, SimAM, SPPF, Concat, Detect
#
# Architecture rationale:
#   P3 (small):  C2f + SimAM       — catches small/overlapping RBCs
#   P4 (mid):    C3TR + SimAM      — transformer context for shape discrimination
#   P5 (large):  SwinTransformer   — global window attention for dense clusters
#   Neck:        SimAM gates on every skip — cross-scale attention
# ════════════════════════════════════════════════════════════════════════════

nc: 3      # hypoxia, normoxia, healthy
scales:
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]
  m: [0.67, 0.75, 768]

# ── Backbone ──────────────────────────────────────────────────────────────────
backbone:
  - [-1, 1, Conv,             [64,  3, 2]]      #  0  P1/2
  - [-1, 1, Conv,             [128, 3, 2]]      #  1  P2/4
  - [-1, 3, C2f,              [128, True]]      #  2
  - [-1, 1, Conv,             [256, 3, 2]]      #  3  P3/8
  - [-1, 6, C2f,              [256, True]]      #  4
  - [-1, 1, SimAM,            [256]]            #  5  ← P3 (param-free attn)
  - [-1, 1, Conv,             [512, 3, 2]]      #  6  P4/16
  - [-1, 6, C3TR,             [512, True]]      #  7  transformer bottleneck
  - [-1, 1, SimAM,            [512]]            #  8  ← P4
  - [-1, 1, Conv,             [1024,3, 2]]      #  9  P5/32
  - [-1, 3, SwinTransformer,  [1024]]           # 10  global window attention
  - [-1, 1, SPPF,             [1024, 5]]        # 11  ← P5

# ── Neck + Head ───────────────────────────────────────────────────────────────
head:
  # top-down path
  - [-1,       1, nn.Upsample, [None, 2, 'nearest']]  # 12  P5 → up
  - [[-1, 8],  1, Concat,      [1]]                   # 13  cat P4  1024+512=1536
  - [-1,       3, C2f,         [512, False]]           # 14
  - [-1,       1, SimAM,       [512]]                  # 15  ← N4

  - [-1,       1, nn.Upsample, [None, 2, 'nearest']]  # 16  N4 → up
  - [[-1, 5],  1, Concat,      [1]]                   # 17  cat P3  512+256=768
  - [-1,       3, C2f,         [256, False]]           # 18
  - [-1,       1, SimAM,       [256]]                  # 19  ← N3 (P3 out)

  # bottom-up path
  - [-1,        1, Conv,       [256, 3, 2]]            # 20  down
  - [[-1, 15],  1, Concat,     [1]]                   # 21  cat N4  256+512=768
  - [-1,        3, C3TR,       [512, False]]           # 22  transformer in PAN
  - [-1,        1, SimAM,      [512]]                  # 23  ← N4 (P4 out)

  - [-1,        1, Conv,       [512, 3, 2]]            # 24  down
  - [[-1, 11],  1, Concat,     [1]]                   # 25  cat P5  512+1024=1536
  - [-1,        3, C2f,        [1024, False]]          # 26  ← N5 (P5 out)

  # detect
  - [[19, 23, 26], 1, Detect,  [nc]]                  # 27
