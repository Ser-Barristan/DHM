  - [-1, 2, C3k2, [256, False]]                  # 20

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 21
  - [[-1, 1], 1, Concat, [1]]                    # 22 fuse P2
  - [-1, 2, C3k2, [128, False]]                  # 23 P2/4-tiny

  - [-1, 1, Conv, [128, 3, 2]]                   # 24
  - [[-1, 20], 1, Concat, [1]]                   # 25
  - [-1, 2, C3k2, [256, False]]                  # 26 P3/8-small

  - [-1, 1, Conv, [256, 3, 2]]                   # 27
  - [[-1, 17], 1, Concat, [1]]                   # 28
  - [-1, 2, C3k2, [512, False]]                  # 29 P4/16-medium

  - [-1, 1, Conv, [512, 3, 2]]                   # 30
  - [[-1, 14], 1, Concat, [1]]                   # 31
  - [-1, 2, C3k2, [1024, True]]                  # 32 P5/32-large

  - [[23, 26, 29, 32], 1, Detect, [nc]]          # 33 Detect(P2,P3,P4,P5)
